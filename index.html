<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
<meta name="theme-color" content="#2E3C6E">
<title>リモート査定 | Telesatei</title>
<style>
  :root {
    --navy: #2E3C6E;
    --navy-light: #ECEEF6;
    --lav: #8E7CC3;
    --lav-deep: #6C5CB8;
    --lav-light: #F1EDF8;
    --bg: #FBFBFD;
    --surface: #FFFFFF;
    --border: #E3E2EC;
    --text: #23263B;
    --sub: #8A8CA0;
    --danger: #C0392B;
    --danger-light: #FDEDEB;
    --font: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body { background: var(--navy); font-family: var(--font); color: var(--text); position: fixed; inset: 0; width: 100%; overflow: hidden; }
  #root { max-width: 430px; margin: 0 auto; height: 100%; height: 100dvh; display: flex; flex-direction: column; position: relative; overflow: hidden; }
  button { font-family: var(--font); cursor: pointer; }
  input, select { font-family: var(--font); outline: none; }
  .screen { display: none; height: 100%; flex-direction: column; }
  .screen.show { display: flex; }

  /* ---- PAT ---- */
  #pat-screen { background: var(--bg); padding: 48px 24px; overflow-y: auto; }
  #pat-screen h1 { font-size: 20px; font-weight: 700; text-align: center; margin: 12px 0 20px; }
  .pat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; }
  .pat-note { font-size: 13px; color: var(--sub); line-height: 1.7; margin-bottom: 14px; }
  .pat-card input { width: 100%; border: 1.5px solid var(--border); border-radius: 10px; padding: 13px; font-size: 15px; background: var(--bg); margin-bottom: 12px; }
  .pat-card input:focus { border-color: var(--navy); background: #fff; }

  /* ---- ask (hero + sheet) ---- */
  #ask-screen { background: var(--navy); }
  .hero { padding: calc(env(safe-area-inset-top, 0px) + 18px) 22px 0; color: #fff; flex-shrink: 0; }
  .hero-top { display: flex; align-items: center; gap: 10px; }
  .hero-logo { width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0; }
  .pat-logo { display: block; width: 150px; height: 150px; margin: 0 auto; border-radius: 20px; }
  .hero-title { flex: 1; font-size: 14px; font-weight: 700; }
  .hero-cart { border: none; font-size: 11.5px; font-weight: 700; background: rgba(255,255,255,.14); color: #fff; border-radius: 999px; padding: 7px 13px; }
  .hero-body { margin-top: 14px; min-height: 78px; padding-bottom: 6px; }
  .hero-stage { font-size: 11px; font-weight: 700; color: #AEB6D6; letter-spacing: .08em; }
  .hero-sum1 { font-size: 19px; font-weight: 700; margin-top: 5px; line-height: 1.4; overflow-wrap: anywhere; }
  .hero-sum2 { font-size: 12.5px; color: #AEB6D6; margin-top: 3px; line-height: 1.6; overflow-wrap: anywhere; }
  .hero-warn { display: none; font-size: 11.5px; font-weight: 700; background: var(--danger); color: #fff; border-radius: 999px; padding: 4px 11px; margin-top: 7px; }
  .hero-warn.show { display: inline-block; }
  .sheet-wrap { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; min-height: 0; }
  .sheet { background: var(--bg); border-radius: 26px 26px 0 0; padding: 20px 22px calc(env(safe-area-inset-bottom, 0px) + 26px); box-shadow: 0 -8px 30px rgba(0,0,0,.18); flex: 1; overflow-y: auto; }
  .q-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .q-back { border: none; background: #EFEFF4; border-radius: 999px; width: 38px; height: 38px; font-size: 16px; color: #5A5D75; flex-shrink: 0; }
  .q-progress { font-size: 11px; font-weight: 700; color: var(--lav); font-family: ui-monospace, Menlo, monospace; }
  .q-label { font-size: 17px; font-weight: 700; margin-top: 2px; }
  .q-hint { font-size: 11.5px; color: var(--sub); margin-top: 2px; }
  .opt-grid { display: grid; gap: 8px; }
  .opt-btn { border: 1.5px solid var(--border); border-radius: 12px; padding: 15px 10px; font-size: 14.5px; font-weight: 700; background: #fff; color: var(--text); text-align: center; min-height: 52px; }
  .opt-btn.active { border-color: var(--navy); background: var(--navy-light); color: var(--navy); }
  .opt-btn.active.ai-pick { border-color: #4A6FD4; background: #E8EEFC; color: #2E4CA8; box-shadow: 0 0 0 1px #4A6FD4 inset; }
  .chip-wrap { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 14px; }
  .chip { border: 1.5px solid var(--border); border-radius: 999px; padding: 12px 16px; font-size: 13.5px; font-weight: 600; background: #fff; color: var(--sub); }
  .chip.active { border-color: var(--lav-deep); background: var(--lav-light); color: var(--lav-deep); }
  .q-input { width: 100%; border: 1.5px solid var(--border); border-radius: 12px; padding: 16px; font-size: 16px; background: #fff; margin-bottom: 12px; }
  .q-input:focus { border-color: var(--navy); }
  .sugg-wrap { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .sugg { border: none; font-size: 12.5px; font-weight: 600; background: var(--lav-light); color: var(--lav-deep); border-radius: 999px; padding: 10px 14px; }
  .btn-row { display: flex; gap: 8px; }
  .btn { border: none; border-radius: 12px; padding: 16px; font-size: 15px; font-weight: 700; width: 100%; }
  .btn-primary { background: var(--navy); color: #fff; }
  .btn-primary.dim { background: #B4B6C6; }
  .btn-ghost { background: #fff; color: var(--sub); border: 1.5px solid var(--border); font-size: 13.5px; }
  .btn-row .btn-ghost { flex: 1; } .btn-row .btn-primary { flex: 2; }
  .img-drop { width: 100%; border: 1.5px dashed #C6C9DA; border-radius: 14px; padding: 28px 20px; text-align: center; background: #fff; font-size: 14px; color: var(--sub); margin-bottom: 12px; line-height: 1.7; }
  .img-previews { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .img-previews:empty { display: none; }
  .imgp { position: relative; width: 62px; height: 62px; }
  .imgp img { width: 62px; height: 62px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); }
  .imgp button { position: absolute; top: -5px; right: -5px; width: 20px; height: 20px; border-radius: 50%; background: var(--danger); color: #fff; font-size: 11px; border: none; line-height: 1; }

  /* ---- cart ---- */
  #cart-screen { background: var(--bg); overflow-y: auto; padding: calc(env(safe-area-inset-top, 0px) + 20px) 22px calc(env(safe-area-inset-bottom, 0px) + 30px); display: none; }
  #cart-screen.show { display: block; }
  #cart-screen h2 { font-size: 19px; font-weight: 700; margin: 8px 0 2px; }
  .cart-meta { font-size: 12.5px; color: var(--sub); margin-bottom: 14px; }
  .cart-sec { font-size: 11px; font-weight: 700; letter-spacing: .08em; color: var(--sub); margin: 16px 2px 7px; }
  .cart-sec.warn { color: var(--danger); }
  .cart-list { display: flex; flex-direction: column; gap: 8px; }
  .cart-item { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 13px 15px; display: flex; align-items: flex-start; gap: 10px; }
  .cart-item.warn { border-color: #F0C4BE; }
  .ci-num { font-size: 11px; font-weight: 700; color: var(--navy); font-family: ui-monospace, Menlo, monospace; padding-top: 2px; }
  .cart-item.warn .ci-num { color: var(--danger); }
  .ci-body { flex: 1; min-width: 0; }
  .ci-title { font-size: 13.5px; font-weight: 700; }
  .ci-sub { font-size: 11.5px; color: var(--sub); margin-top: 3px; line-height: 1.6; overflow-wrap: anywhere; }
  .ci-warn-badge { display: inline-block; font-size: 10.5px; font-weight: 700; background: var(--danger-light); color: var(--danger); border-radius: 999px; padding: 3px 9px; margin-top: 5px; }
  .ci-del { border: none; background: none; color: var(--sub); font-size: 17px; padding: 0 2px; }
  .empty { font-size: 12.5px; color: #B4B6C6; text-align: center; padding: 10px 0; }
  .cart-foot-note { font-size: 11px; color: #B4B6C6; text-align: center; margin-top: 10px; line-height: 1.7; }
  .pat-reset { font-size: 12px; color: var(--sub); text-align: center; margin-top: 18px; text-decoration: underline; cursor: pointer; }

  /* ---- sent ---- */
  #sent-screen { background: var(--bg); align-items: center; justify-content: center; text-align: center; padding: 40px; }
  .sent-check { width: 64px; height: 64px; border-radius: 50%; background: var(--navy-light); display: flex; align-items: center; justify-content: center; margin: 0 auto; }
  #sent-screen h2 { font-size: 20px; font-weight: 700; margin-top: 18px; }
  #sent-link { font-size: 13px; color: var(--sub); margin-top: 8px; line-height: 1.8; }
  #sent-link a { color: var(--navy); font-weight: 700; }

  /* ---- modal / toast ---- */
  #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; display: none; align-items: center; justify-content: center; padding: 24px; }
  #modal-overlay.show { display: flex; }
  .modal-box { background: #fff; border-radius: 14px; padding: 24px; max-width: 300px; width: 100%; text-align: center; }
  .modal-box h3 { font-size: 16px; font-weight: 700; margin: 10px 0 8px; }
  .modal-box p { font-size: 13.5px; color: var(--sub); line-height: 1.7; margin-bottom: 18px; }
  #toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--text); color: #fff; padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; opacity: 0; transition: opacity .25s, transform .25s; pointer-events: none; white-space: nowrap; z-index: 300; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ---- キーボード表示時 ---- */
  body.kb-open .hero-body { display: none; }
  body.kb-open .hero { padding-top: calc(env(safe-area-inset-top, 0px) + 10px); }
  body.kb-open .sheet { padding-bottom: 16px; }

  /* ---- AI解析中オーバーレイ ---- */
  #ai-loading { position: fixed; inset: 0; z-index: 300; background: rgba(46,60,110,.86); backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); display: none; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
  #ai-loading.show { display: flex; }
  .ai-spinner { width: 46px; height: 46px; border-radius: 50%; border: 4px solid rgba(255,255,255,.25); border-top-color: #fff; animation: aispin .8s linear infinite; }
  @keyframes aispin { to { transform: rotate(360deg); } }
  .ai-loading-text { color: #fff; font-size: 15px; font-weight: 700; }
  .ai-loading-sub { color: rgba(255,255,255,.65); font-size: 12px; }
</style>
</head>

const $ = id => document.getElementById(id);
const toKata = s => (s || '').replace(/[ぁ-ゖ]/g, c => String.fromCharCode(c.charCodeAt(0) + 0x60));
const toHankaku = s => (s || '').replace(/[０-９．]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
const esc = s => (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');

// ---- question definitions ----
function infoQs(fi) {
  const qs = [
    { id: 'store', t: 'store', label: '店舗は？', ph: '店舗名を入力（例：な…成田店）', req: true },
    { id: 'requester', t: 'text', label: '起票者は？', ph: '例：菊地', req: true },
    { id: 'total', t: 'text', label: '総点数（予定）は？', ph: '例：3', num: true, skip: '未定' },
    { id: 'repeater', t: 'choice', label: 'リピーター？', opts: ['はい', 'いいえ'] },
    { id: 'aimi', t: 'choice', label: '相見積もり？', opts: ['はい', 'いいえ'] },
  ];
  if (fi.aimi === 'はい') qs.push({ id: 'reiten', t: 'choice', label: '再来店？', opts: ['はい', 'いいえ'] });
  return qs;
}
function itemQs(a) {
  const qs = [{ id: 'cat', t: 'choice', label: 'カテゴリは？', opts: CATS }];
  const c = a.cat;
  if (!c) return qs;
  const brandQ = { id: 'brand', t: 'text', brand: true, label: 'ブランドは？', ph: 'ひらがなでもOK（例：るい）', req: true };
  const nameQ = { id: 'name', t: 'text', label: '商品名は？', ph: '例：ネヴァーフルMM', req: true };
  const hasImgs = (a._imgs || []).length > 0;
  const imgQ = hasImgs
    ? { id: 'img', t: 'img', label: '写真はこれでOK？', hint: 'AI判定に使った写真をそのまま添付します。追加・削除もできます' }
    : { id: 'img', t: 'img', label: '写真を撮ろう' };
  if (c === 'ブランドバッグ' || c === 'ブランド小物') {
    qs.push(brandQ, nameQ,
      { id: 'serial', t: 'text', label: '型番は？', ph: '例：M40156', hint: 'わかる範囲でOK', skip: 'わからない' },
      { id: 'conds', t: 'multi', label: '状態は？（複数可）', hint: '特記なければ記載不要', opts: BRAND_CONDS }, imgQ);
  } else if (c === 'ブランドジュエリー') {
    qs.push(brandQ, { ...nameQ, ph: '例：ラブリング' },
      { id: 'metal', t: 'choice', label: '金属種類は？', opts: ['K24', 'K18', 'Pt950', '不明'] },
      { id: 'serial', t: 'text', label: '型番は？', ph: '例：B4085400', hint: 'わかる範囲でOK', skip: 'わからない' },
      { id: 'conds', t: 'multi', label: '状態は？（複数可）', hint: '特記なければ記載不要', opts: BRAND_CONDS }, imgQ);
  } else if (c === '時計') {
    qs.push(brandQ, { ...nameQ, ph: '例：デイトナ' },
      { id: 'model', t: 'text', label: '型番は？', ph: '例：116500LN', skip: 'わからない' },
      { id: 'serial', t: 'text', label: 'シリアルは？', ph: '例：F123456', skip: 'わからない' },
      { id: 'size', t: 'text', label: 'ケースサイズ（横幅）は？', ph: '例：40mm', req: true, num: true },
      { id: 'turbo', t: 'choice', label: 'ターボテスターは？', opts: ['済', '不可'] },
      { id: 'acc', t: 'multi', label: '付属品は？（複数可）', opts: WATCH_ACCS },
      { id: 'conds', t: 'multi', label: '状態は？（複数可）', opts: WATCH_CONDS }, imgQ);
  } else { // 貴金属
    qs.push({ id: 'kinshu', t: 'choice', label: '金種は？', opts: ['K24', 'K22', 'K18', 'K14', 'K10', 'Pt1000', 'Pt950', 'Pt900', 'Pt850', 'インゴットK', 'インゴットP', 'コンビ'] },
      { id: 'weight', t: 'text', label: '総重量（g）は？', ph: '例：15.2', req: true, num: true });
    // 石付き確定（AI判定）で比重が「できなかった」自動セット済みなら質問自体を省略
    if (!(a.stone && a.stone !== 'なし' && a.hiju === 'できなかった'))
      qs.push({ id: 'hiju', t: 'text', label: '比重値は？', ph: '数値を入力', num: true, skip: 'できなかった' });
    qs.push({ id: 'jsei', t: 'choice', label: '磁性は？', opts: ['有', '無'], hint: '「有」の場合は預かり対応品になります' },
      { id: 'stone', t: 'choice', label: '主石・脇石は？', opts: ['なし', '主石のみ', '脇石のみ', '両方'] });
    if (a.stone === '主石のみ' || a.stone === '両方') qs.push({ id: 'stoneMain', t: 'choice', label: '主石の種類は？', opts: GEMS });
    if (a.stone === '脇石のみ' || a.stone === '両方') qs.push({ id: 'stoneWaki', t: 'choice', label: '脇石の種類は？', opts: GEMS });
    if (a.stone && a.stone !== 'なし') {
      qs.push({ id: 'gem', t: 'choice', label: 'ジェムテスターは？', opts: ['済', '不可'] },
        { id: 'dia', t: 'choice', label: 'ダイヤテスターは？', opts: ['OK', 'NG'] });
      if (a.stone === '主石のみ' || a.stone === '両方') qs.push({ id: 'ct', t: 'text', label: 'ct数（主石）は？', ph: '例：0.5', num: true, skip: '不明' });
      if (a.stone === '脇石のみ' || a.stone === '両方') qs.push({ id: 'ctWaki', t: 'text', label: 'ct数（脇石）は？', ph: '例：0.1', num: true, skip: '不明' });
    }
    qs.push({ id: 'conds', t: 'multi', label: 'どんな状態？（複数可）', opts: METAL_CONDS }, imgQ);
  }
  return qs;
}

// ---- engine ----
function cur() {
  const isInfo = S.stage === 'info';
  const qs = isInfo ? infoQs(S.fi) : itemQs(S.fa);
  const idx = Math.min(isInfo ? S.ii : S.ai, qs.length - 1);
  return { isInfo, qs, idx, q: qs[idx], store: isInfo ? S.fi : S.fa };
}
function adv() {
  const { isInfo, qs, idx } = cur();
  if (isInfo) {
    if (idx + 1 < infoQs(S.fi).length) S.ii = idx + 1;
    else { S.stage = 'item'; S.ai = 0; S.fa = {}; }
  } else {
    const nqs = itemQs(S.fa);
    if (idx + 1 < nqs.length) S.ai = idx + 1;
  }
  render();
}
function goBack() {
  const { isInfo, idx } = cur();
  if (!isInfo && idx === 0) {
    if (S.cart.length || S.azukari.length) { goCart(); return; }
    S.stage = 'info'; S.ii = infoQs(S.fi).length - 1;
  } else if (isInfo) S.ii = Math.max(0, idx - 1);
  else S.ai = Math.max(0, idx - 1);
  render();
}
function choose(val) { const { q, store } = cur(); store[q.id] = val; adv(); }
function toggleMulti(opt) {
  const { q, store } = cur();
  const sel = store[q.id] || [];
  store[q.id] = sel.includes(opt) ? sel.filter(x => x !== opt) : [...sel, opt];
  renderBody();
}
function textInput(el) {
  const { q, store } = cur();
  if (q.num) el.value = toHankaku(el.value);
  store[q.id] = el.value;
  const btn = $('q-next');
  if (btn) btn.className = 'btn btn-primary' + (q.req && !el.value.trim() ? ' dim' : '');
}
function textNext() {
  const { q, store } = cur();
  if (q.req && !(store[q.id] || '').trim()) { showToast(q.label.replace('？', '') + 'を入力してください'); return; }
  adv();
}
function skipQ() { const { q, store } = cur(); store[q.id] = q.skip; adv(); }
function pickBrand(b) { const { store } = cur(); store.brand = b; adv(); }
function brandInput(el) {
  const { store } = cur();
  store.brand = el.value;
  renderSuggs();
  const btn = $('q-next');
  if (btn) btn.className = 'btn btn-primary' + (!el.value.trim() ? ' dim' : '');
}
function renderSuggs() {
  const wrap = $('sugg-wrap'); if (!wrap) return;
  const list = BRANDS[S.fa.cat] || [];
  const qk = toKata((S.fa.brand || '').trim());
  const res = (qk ? list.filter(b => b.includes(S.fa.brand.trim()) || b.includes(qk) || toKata(b).includes(qk)) : list).slice(0, 6);
  wrap.innerHTML = res.map(b => `<button class="sugg" onclick="pickBrand('${esc(b)}')">${esc(b)}</button>`).join('');
}
// store (member) search
function pickStore(gid, name) { selectedMember = { gid, name }; S.fi.store = name; adv(); }
function storeInput(el) {
  S.fi.store = el.value; selectedMember = null;
  const wrap = $('sugg-wrap'); if (!wrap) return;
  const q = el.value.trim(); const qk = toKata(q);
  const res = q ? projectMembers.filter(m => m.name.includes(q) || m.name.includes(qk) || toKata(m.name).includes(qk)) : projectMembers;
  wrap.innerHTML = res.slice(0, 6).map(m => `<button class="sugg" onclick="pickStore('${m.gid}','${esc(m.name)}')">${esc(m.name)}</button>`).join('') || '<span style="font-size:12px;color:#B4B6C6">該当メンバーなし</span>';
}
function storeNext() {
  if (!selectedMember) { showToast('候補から店舗を選択してください'); return; }
  adv();
}
// images
function addImages(input) {
  if (!S.fa._imgs) S.fa._imgs = [];
  Array.from(input.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = e => { S.fa._imgs.push({ file, dataUrl: e.target.result }); renderBody(); };
    reader.readAsDataURL(file);
  });
  input.value = '';
}
function removeImage(i) { S.fa._imgs.splice(i, 1); renderBody(); }
// ---- AI査定（Worker proxy経由） ----
async function aiAppraise(input) {
  const files = Array.from(input.files).slice(0, 6);
  input.value = '';
  if (!files.length) return;
  $('ai-loading').classList.add('show');
  try {
    const imgs = await Promise.all(files.map(file => new Promise((ok, ng) => {
      const r = new FileReader();
      r.onload = e => ok({ file, dataUrl: e.target.result });
      r.onerror = ng;
      r.readAsDataURL(file);
    })));
    const payload = imgs.map(im => {
      const [meta, data] = im.dataUrl.split(',');
      return { media_type: meta.match(/data:(.*?);/)[1], data };
    });
    const res = await fetch(AI_PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + AI_TOKEN },
      body: JSON.stringify({ images: payload }),
    });
    const out = await res.json();
    if (!res.ok || !out.result) { showToast('AI判定に失敗しました（' + (out.error || res.status) + '）'); return; }
    const r = out.result;
    // 写真を商品画像としてセット
    S.fa._imgs = imgs;
    // プリフィル（AIが答えられた分だけ。空文字は上書きしない）
    S.fa._aiSet = [];
    const setA = (k, v) => { S.fa[k] = v; S.fa._aiSet.push(k); };
    if (CATS.includes(r.category)) setA('cat', r.category);
    if (r.brand) setA('brand', r.brand);
    if (r.name) setA('name', r.name);
    if (r.model) {
      if (S.fa.cat === '時計') setA('model', r.model); // 時計のserialはケースシリアル。混入させない
      else setA('serial', r.model);
    }
    if (Array.isArray(r.conds) && r.conds.length) setA('conds', r.conds);
    if (r.kinshu) setA('kinshu', r.kinshu);
    if (['なし', '主石のみ', '脇石のみ', '両方'].includes(r.stone)) setA('stone', r.stone);
    if (S.fa.stone && S.fa.stone !== 'なし') setA('hiju', 'できなかった'); // 石付きは比重測定が成立しない→質問も省略される
    if (GEMS.includes(r.stoneMain)) setA('stoneMain', r.stoneMain);
    if (GEMS.includes(r.stoneWaki)) setA('stoneWaki', r.stoneWaki);
    if (['済', '不可'].includes(r.gem)) setA('gem', r.gem);
    if (['OK', 'NG'].includes(r.dia)) setA('dia', r.dia);
    if (r.ct) setA('ct', String(r.ct));
    if (r.ctWaki) setA('ctWaki', String(r.ctWaki));
    if (['有', '無'].includes(r.jsei)) setA('jsei', r.jsei);
    if (r.weight) setA('weight', String(r.weight));
    if (r.hiju && !(S.fa.stone && S.fa.stone !== 'なし')) setA('hiju', String(r.hiju));
    S.fa._aiNote = r.note || '';
    S.fa._aiFlags = Array.isArray(r.flags) ? r.flags : [];
    if (S.fa.cat) S.ai = 1; // カテゴリ確定済みなら次の質問へ
    render();
    showToast('✅ AI判定を反映しました。各項目を確認してください');
    if (S.fa._aiFlags.length) setTimeout(() => showModal('AIからの確認ポイント', S.fa._aiFlags.join('\n'), () => {}, { icon: '🔍', okLabel: '確認しました', hideCancel: true }), 600);
  } catch (e) {
    showToast('AI判定エラー: 通信に失敗しました');
  } finally {
    $('ai-loading').classList.remove('show');
  }
}
function finishItem() {
  if (S.fa.jsei === '有') {
    showModal('磁性あり', 'この商品は通常査定には入りません。預かり対応品として追加しますか？', () => {
      S.azukari.push(S.fa); S.fa = {}; S.ai = 0; goCart();
      showToast('⚠️ 預かり対応品 ' + S.azukari.length + ' 点目を追加しました');
    });
    return;
  }
  S.cart.push(S.fa); S.fa = {}; S.ai = 0; goCart();
  showToast('商品 ' + S.cart.length + ' 点目を追加しました');
}

// ---- render ----
function itemTitle(a) {
  if (a.cat === '貴金属') return [a.kinshu, a.weight ? a.weight + 'g' : ''].filter(Boolean).join(' ') || '貴金属';
  return [a.brand, a.name].filter(Boolean).join(' ') || a.cat || '';
}
function render() {
  ['ask-screen', 'sent-screen'].forEach(id => $(id).classList.remove('show'));
  $('cart-screen').classList.remove('show');
  if (S.stage === 'cart') { renderCart(); $('cart-screen').classList.add('show'); return; }
  if (S.stage === 'sent') { $('sent-screen').classList.add('show'); return; }
  $('ask-screen').classList.add('show');
  const { isInfo, qs, idx, q } = cur();
  const cartN = S.cart.length + S.azukari.length;
  $('hero-cart').style.display = cartN ? '' : 'none';
  $('hero-cart').textContent = 'カート ' + cartN + '点 →';
  $('hero-stage').textContent = isInfo ? '依頼情報' : '商品 ' + (cartN + 1) + ' 点目を入力中';
  $('hero-sum1').textContent = isInfo ? (S.fi.requester ? '起票者：' + S.fi.requester : 'まず依頼情報から') : (itemTitle(S.fa) || 'カテゴリ選択から');
  const bits = isInfo
    ? [S.fi.store || '', S.fi.total ? '予定 ' + S.fi.total + '点' : '', S.fi.repeater ? 'リピーター:' + S.fi.repeater : '', S.fi.aimi ? '相見積:' + S.fi.aimi : ''].filter(Boolean)
    : [S.fa.cat, (S.fa.conds || []).join('・')].filter(Boolean);
  $('hero-sum2').textContent = bits.join(' ／ ') || (isInfo ? '5問前後で完了します' : '');
  $('hero-warn').classList.toggle('show', !isInfo && S.fa.jsei === '有');
  $('q-back').style.display = (isInfo && idx === 0) ? 'none' : '';
  $('q-progress').textContent = (isInfo ? '依頼情報 ' : '') + 'Q ' + (idx + 1) + ' / ' + qs.length;
  $('q-label').textContent = q.label;
  $('q-hint').textContent = q.hint || '';
  $('q-hint').style.display = q.hint ? '' : 'none';
  renderBody();
}
function renderBody() {
  const { q, store } = cur();
  const body = $('q-body');
  if (q.t === 'choice') {
    const cols = q.opts.length > 5 || q.opts.some(o => o.length <= 4) ? '1fr 1fr' : '1fr';
    const aiBtn = (q.id === 'cat' && AI_TOKEN)
      ? `<input type="file" id="ai-img-input" accept="image/*" multiple style="display:none" onchange="aiAppraise(this)">`
        + `<button class="btn btn-ghost" style="width:100%;margin-bottom:4px" onclick="$('ai-img-input').click()">📷 写真からAI判定（自動入力）</button>`
        + `<div style="font-size:11.5px;color:#B4B6C6;text-align:center;margin-bottom:12px">全体像・刻印・計量器の表示（g/SG）を撮ると精度UP。手書きメモより機器の表示を</div>`
      : '';
    body.innerHTML = aiBtn + `<div class="opt-grid" style="grid-template-columns:${cols}">` +
      q.opts.map(o => `<button class="opt-btn${store[q.id] === o ? ((store._aiSet || []).includes(q.id) ? ' active ai-pick' : ' active') : ''}" onclick="choose('${esc(o)}')">${esc(o)}</button>`).join('') + '</div>' +
      ((store._aiSet || []).includes(q.id) && store[q.id] ? '<div style="font-size:11.5px;color:#8FA8E8;text-align:center;margin-top:10px">🤖 AI判定でこの選択肢が入っています。違っていればタップで修正</div>' : '');
  } else if (q.t === 'multi') {
    const sel = store[q.id] || [];
    body.innerHTML = '<div class="chip-wrap">' +
      q.opts.map(o => `<button class="chip${sel.includes(o) ? ' active' : ''}" onclick="toggleMulti('${esc(o)}')">${esc(o)}</button>`).join('') +
      `</div><button class="btn btn-primary" onclick="adv()">${sel.length ? '次へ（' + sel.length + '件選択）' : '該当なしで次へ'}</button>`;
  } else if (q.t === 'text') {
    const val = store[q.id] || '';
    const dim = q.req && !val.trim() ? ' dim' : '';
    body.innerHTML =
      `<input class="q-input" type="text" ${q.num ? 'inputmode="decimal"' : ''} value="${esc(val)}" placeholder="${esc(q.ph || '')}" oninput="${q.brand ? 'brandInput(this)' : 'textInput(this)'}" onkeydown="if(event.key==='Enter'&&!event.isComposing&&event.keyCode!==229){textNext()}">`
      + (q.brand ? '<div class="sugg-wrap" id="sugg-wrap"></div>' : '')
      + `<div class="btn-row">${q.skip ? `<button class="btn btn-ghost" onclick="skipQ()">${esc(q.skip)}</button>` : ''}<button class="btn btn-primary${dim}" id="q-next" onclick="textNext()">次へ</button></div>`;
    if (q.brand) renderSuggs();
    body.querySelector('input').focus({ preventScroll: true });
  } else if (q.t === 'store') {
    body.innerHTML =
      `<input class="q-input" type="text" value="${esc(store.store || '')}" placeholder="${esc(q.ph)}" oninput="storeInput(this)">`
      + '<div class="sugg-wrap" id="sugg-wrap"></div>'
      + `<div class="btn-row"><button class="btn btn-primary${selectedMember ? '' : ' dim'}" id="q-next" onclick="storeNext()">次へ</button></div>`
      + (projectMembers.length ? '' : '<div style="font-size:11.5px;color:#B4B6C6;text-align:center;margin-top:8px">メンバー取得中…（Asana接続を確認）</div>');
    storeInput(body.querySelector('input'));
  } else if (q.t === 'img') {
    const imgs = store._imgs || [];
    body.innerHTML =
      `<input type="file" id="img-input" accept="image/*" multiple style="display:none" onchange="addImages(this)">`
      + `<button class="img-drop" onclick="$('img-input').click()">${imgs.length ? '📷 追加で撮影する（現在' + imgs.length + '枚）' : '📷 タップして撮影（0枚）'}<br><span style="font-size:12px">複数可</span></button>`
      + '<div class="img-previews">' + imgs.map((im, i) => `<div class="imgp"><img src="${im.dataUrl}"><button onclick="removeImage(${i})">×</button></div>`).join('') + '</div>'
      + '<button class="btn btn-primary" onclick="finishItem()">この商品をカートに追加</button>';
  }
}
function goCart() { S.stage = 'cart'; render(); }
function addAnother() { S.stage = 'item'; S.ai = 0; S.fa = {}; render(); }
function cartRow(a, i, warn) {
  const bits = [a.cat, a.metal ? '金属:' + a.metal : '', a.serial ? '型番 ' + a.serial : '', a.model ? '型番 ' + a.model : '',
    a.size ? 'ケース ' + a.size : '', a.turbo ? 'ターボ' + a.turbo : '', a.hiju ? '比重 ' + a.hiju : '', a.jsei ? '磁性' + a.jsei : '',
    a.stone && a.stone !== 'なし' ? a.stone : '',
    (a.conds || []).join('・'), (a.acc || []).join('・'), (a._imgs || []).length + '枚の画像'].filter(Boolean);
  const junk = (a.conds || []).includes('破れや破損');
  return `<div class="cart-item${warn ? ' warn' : ''}">
    <span class="ci-num">${warn ? '預' : ''}${String(i + 1).padStart(2, '0')}</span>
    <div class="ci-body"><div class="ci-title">${esc(itemTitle(a))}</div><div class="ci-sub">${esc(bits.join(' ／ '))}</div>
    ${junk ? '<span class="ci-warn-badge">⚠ ジャンク扱い</span>' : ''}${warn ? '<span class="ci-warn-badge">⚠ 預かり対応（磁性あり）</span>' : ''}</div>
    <button class="ci-del" onclick="removeItem(${warn}, ${i})">×</button></div>`;
}
function removeItem(warn, i) { (warn ? S.azukari : S.cart).splice(i, 1); renderCart(); }
function renderCart() {
  $('cart-meta').textContent = (S.fi.store || '店舗未選択') + ' ・ 起票者：' + (S.fi.requester || '—');
  $('cart-list').innerHTML = S.cart.map((a, i) => cartRow(a, i, false)).join('') || '<div class="empty">まだ商品がありません</div>';
  $('azukari-list').innerHTML = S.azukari.map((a, i) => cartRow(a, i, true)).join('') || '<div class="empty">預かり品なし</div>';
  const n = S.cart.length + S.azukari.length;
  const ok = selectedMember && (S.fi.requester || '').trim() && n > 0;
  const btn = $('submit-btn');
  btn.textContent = 'Asanaに送信（' + n + '点）';
  btn.className = 'btn btn-primary' + (ok ? '' : ' dim');
}

// ---- PAT / Asana ----
function init() {
  const saved = localStorage.getItem('asana_pat');
  AI_TOKEN = localStorage.getItem('ai_token') || '';
  const forceSetup = new URLSearchParams(location.search).has('reset');
  if (forceSetup) history.replaceState(null, '', location.pathname);
  if (saved && !forceSetup) { ASANA_PAT = saved; startApp(); }
  else {
    if (saved) $('pat-input').value = saved;
    if (AI_TOKEN) $('ai-token-input').value = AI_TOKEN;
    $('pat-screen').classList.add('show');
  }
}
function savePat() {
  const val = $('pat-input').value.trim();
  if (!val) return showToast('APIキーを入力してください');
  ASANA_PAT = val; localStorage.setItem('asana_pat', val);
  const ai = $('ai-token-input').value.trim();
  if (ai) { AI_TOKEN = ai; localStorage.setItem('ai_token', ai); }
  $('pat-screen').classList.remove('show');
  startApp();
}
function resetPat() {
  location.href = location.pathname + '?reset=1';
}
function startApp() { render(); fetchProjectMembers(); }
async function fetchProjectMembers() {
  try {
    const res = await fetch(`https://app.asana.com/api/1.0/projects/${ASANA_PROJECT_ID}/members?opt_fields=gid,name`, {
      headers: { 'Authorization': `Bearer ${ASANA_PAT}`, 'Accept': 'application/json' }
    });
    const data = await res.json();
    projectMembers = (data.data || []).map(m => ({ gid: m.gid, name: m.name }));
  } catch (e) { /* silent */ }
  const { q } = cur();
  if (S.stage === 'info' && q.t === 'store') renderBody();
}

function itemNotes(a, i) {
  const NL = String.fromCharCode(10);
  const parts = [(i + 1) + ':', 'カテゴリ: ' + a.cat];
  if (a.brand) parts.push('ブランド: ' + a.brand);
  if (a.name) parts.push('商品名: ' + a.name);
  if (a.serial && a.serial !== 'わからない') parts.push('型番: ' + a.serial);
  if (a.model && a.model !== 'わからない') parts.push('型番: ' + a.model);
  if (a.cat === '時計' && a.serial && a.serial !== 'わからない') { /* シリアルはserialに入っている場合modelと分離済み */ }
  if (a.metal) parts.push('金属種類: ' + a.metal);
  if (a.size) parts.push('ケースサイズ: ' + a.size);
  if (a.turbo) parts.push('ターボテスター: ' + a.turbo);
  if (a.acc && a.acc.length) parts.push('付属品: ' + a.acc.join('・'));
  if (a.kinshu) parts.push('金種: ' + a.kinshu);
  if (a.weight) parts.push('総重量: ' + a.weight + 'g');
  if (a.hiju) parts.push('比重値: ' + a.hiju);
  if (a.jsei) parts.push('磁性: ' + a.jsei);
  if (a.stone) parts.push('主石・脇石: ' + a.stone);
  if (a.stoneMain) parts.push('主石種類: ' + a.stoneMain);
  if (a.stoneWaki) parts.push('脇石種類: ' + a.stoneWaki);
  if (a.gem) parts.push('ジェムテスター: ' + a.gem);
  if (a.dia) parts.push('ダイヤテスター: ' + a.dia);
  const ctBits = [(a.ct && a.ct !== '不明') ? '主石' + a.ct + 'ct' : '', (a.ctWaki && a.ctWaki !== '不明') ? '脇石' + a.ctWaki + 'ct' : ''].filter(Boolean).join(' ');
  if (ctBits) parts.push('ct: ' + ctBits);
  if (a.conds && a.conds.length) parts.push('状態詳細: ' + a.conds.join('・'));
  if ((a.conds || []).includes('破れや破損')) parts.push('⚠️ ジャンク扱い');
  if ((a._imgs || []).length) parts.push('画像: ' + a._imgs.length + '枚添付');
  return parts.join(NL);
}
async function uploadImages(taskId, imgs) {
  for (const img of imgs) {
    const fd = new FormData();
    fd.append('file', img.file, img.file.name);
    await fetch(`https://app.asana.com/api/1.0/tasks/${taskId}/attachments`, {
      method: 'POST', headers: { 'Authorization': `Bearer ${ASANA_PAT}` }, body: fd
    });
  }
}
async function postAiComment(taskId, a, i) {
  if (!((a._aiFlags && a._aiFlags.length) || a._aiNote)) return;
  const NL = String.fromCharCode(10);
  const eh = s => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  const title = itemTitle(a) || '商品' + (i + 1);
  const hdr = { 'Authorization': `Bearer ${ASANA_PAT}`, 'Content-Type': 'application/json', 'Accept': 'application/json' };
  let h = `<strong>🔍 AI査定メモ — ${eh(title)}</strong>`;
  if (a._aiFlags && a._aiFlags.length) h += NL + '<ul>' + a._aiFlags.map(f => '<li>' + eh(f) + '</li>').join('') + '</ul>';
  if (a._aiNote) h += NL + '<strong>所見:</strong> ' + eh(a._aiNote);
  const res = await fetch(`https://app.asana.com/api/1.0/tasks/${taskId}/stories`, {
    method: 'POST', headers: hdr, body: JSON.stringify({ data: { html_text: '<body>' + h + '</body>' } })
  });
  if (!res.ok) {
    // html_textが弾かれた場合はプレーンテキストで再投稿
    await fetch(`https://app.asana.com/api/1.0/tasks/${taskId}/stories`, {
      method: 'POST', headers: hdr,
      body: JSON.stringify({ data: { text: '🔍 AI査定メモ — ' + title + NL + (a._aiFlags || []).map(f => '・' + f).join(NL) + (a._aiNote ? NL + '所見: ' + a._aiNote : '') } })
    });
  }
}
async function submitToAsana() {
  const NL = String.fromCharCode(10);
  const store = S.fi.store || '';
  const requester = (S.fi.requester || '').trim();
  const n = S.cart.length + S.azukari.length;
  if (!selectedMember) return showToast('店舗が未選択です');
  if (!requester) return showToast('起票者が未入力です');
  if (n === 0) return showToast('商品がありません');
  const btn = $('submit-btn');
  btn.className = 'btn btn-primary dim'; btn.textContent = '送信中...';
  const headerLines = ['<start>', '店舗: ' + store, '起票者: ' + requester, '総点数: ' + (S.fi.total && S.fi.total !== '未定' ? S.fi.total : n) + '点'];
  if (S.fi.repeater) headerLines.push('リピーター: ' + S.fi.repeater);
  if (S.fi.aimi) headerLines.push('相見積もり: ' + S.fi.aimi);
  if (S.fi.aimi === 'はい' && S.fi.reiten) headerLines.push('再来店: ' + S.fi.reiten);
  try {
    let mainTaskId = null;
    if (S.cart.length > 0) {
      const notes = headerLines.join(NL) + NL + NL + S.cart.map(itemNotes).join(NL + NL) + NL + NL + '<end>';
      const res = await fetch('https://app.asana.com/api/1.0/tasks', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${ASANA_PAT}`, 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({ data: { name: `【査定依頼】${store} / ${requester} (${S.cart.length}点)`, notes, projects: [ASANA_PROJECT_ID], followers: [selectedMember.gid] } })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.errors?.[0]?.message || '作成失敗');
      mainTaskId = data.data.gid;
      await uploadImages(mainTaskId, S.cart.flatMap(a => a._imgs || []));
      for (let i = 0; i < S.cart.length; i++) await postAiComment(mainTaskId, S.cart[i], i);
    }
    if (S.azukari.length > 0) {
      const azNotes = ['<start>', '店舗: ' + store, '起票者: ' + requester, '【検査預かり】'].join(NL) + NL + NL
        + S.azukari.map((a, i) => itemNotes(a, i).replace(NL + '磁性: 有', '').replace('カテゴリ: 貴金属', 'カテゴリ: 貴金属' + NL + '⚠️ 磁性: 有')).join(NL + NL) + NL + NL + '<end>';
      const res = await fetch('https://app.asana.com/api/1.0/tasks', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${ASANA_PAT}`, 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({ data: { name: `【検査預かり】${store} / ${requester} (${S.azukari.length}点)`, notes: azNotes, projects: [ASANA_PROJECT_ID], followers: [selectedMember.gid] } })
      });
      const data = await res.json();
      if (res.ok) {
        const azId = data.data.gid;
        await fetch(`https://app.asana.com/api/1.0/sections/${AZUKARI_SECTION_ID}/addTask`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${ASANA_PAT}`, 'Content-Type': 'application/json', 'Accept': 'application/json' },
          body: JSON.stringify({ data: { task: azId } })
        });
        await uploadImages(azId, S.azukari.flatMap(a => a._imgs || []));
        for (let i = 0; i < S.azukari.length; i++) await postAiComment(azId, S.azukari[i], i);
      }
    }
    $('sent-link').innerHTML = mainTaskId
      ? `タスクID: ${mainTaskId}<br><a href="https://app.asana.com/0/${ASANA_PROJECT_ID}/${mainTaskId}" target="_blank">Asanaで確認する →</a>`
      : '送信完了（預かり品のみ）';
    S.stage = 'sent'; render();
  } catch (e) {
    showToast('エラー: ' + e.message);
    renderCart();
  }
}
function resetAll() {
  S = { stage: 'info', ii: 0, ai: 0, fi: {}, fa: {}, cart: [], azukari: [] };
  selectedMember = null;
  render();
}

// ---- modal / toast ----
function showModal(title, msg, onOk, opts) {
  opts = opts || {};
  const box = $('modal-box');
  box.innerHTML = `<div style="font-size:28px">${opts.icon || '⚠️'}</div><h3>${esc(title)}</h3><p>${esc(msg)}</p>
    <div style="display:flex;gap:8px">
    ${opts.hideCancel ? '' : '<button class="btn btn-ghost" id="modal-no">キャンセル</button>'}
    <button class="btn btn-primary" id="modal-ok" style="flex:1.2">${esc(opts.okLabel || '預かりに追加')}</button></div>`;
  $('modal-overlay').classList.add('show');
  if (!opts.hideCancel) $('modal-no').onclick = () => $('modal-overlay').classList.remove('show');
  $('modal-ok').onclick = () => { $('modal-overlay').classList.remove('show'); onOk(); };
}
function showToast(msg) {
  const t = $('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
document.addEventListener('DOMContentLoaded', init);
// iOSキーボード対策: visualViewportに合わせて#rootの高さを追従させる
if (window.visualViewport) {
  const vv = window.visualViewport;
  const fit = () => {
    const root = document.getElementById('root');
    if (!root) return;
    const kb = window.innerHeight - vv.height;
    const open = kb > 60;
    const target = open ? Math.round(vv.height) + 'px' : '';
    if (root.style.height !== target) root.style.height = target;
    document.body.classList.toggle('kb-open', open);
  };
  vv.addEventListener('resize', fit);
}
</script>
</body>
